<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>To Do List</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div id="top-section">
            <h1 id="title">My To-Do List</h1>
            <div id="filter-input">
                <form id="filter-form">
                    <input type="radio" id="filter-all" name="filter" value="all">
                    <label for="filter-all">All Tasks</label>
                    <input type="radio" id="filter-active" name="filter" value="active">
                    <label for="filter-active">Active Tasks</label>
                    <input type="radio" id="filter-completed" name="filter" value="completed">
                    <label for="filter-completed">Completed Tasks</label>
                </form>
            </div>

            <div id="task-input">
                <form id="task-form">
                    <label for="input-task" id="input-task-label">Enter a Task: </label>
                    <input type="text" id="input-task" />
                    <button type="submit" id="add-task">Add Task</button>
                </form>
            </div>

            <div id="stats-list">
                <div id="stats-bar">
                    <p id="remaining-tasks"></p>
                </div>

                <div id="clear-list">
                    <button type="button" id="clear-task">Clear Completed Tasks</button>
                </div>    
            </div>

            <div id="task-list">

            </div>
        </div>

        <p id="error-message"></p>

        <script src="scripts.js" async defer></script>
    </body>
</html>
